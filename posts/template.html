<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>
        <@ title=> $$ @>
    </title>
    <link rel="stylesheet" href="/posts/post.css"/>
</head>

<body>
    <# menubar.html #>
    <div id="content">
        <@ title=>
            <header>$$</header> @>
            <article>
                <@ body=> $$ @>
            </article>
    </div>
    <div id="foot" class="status-bar">
        <p id="tag-field" class="status-bar-field">
            <@ tags?=> Etiketler: @> <@ tags=> $$ @, >
        </p>
        <p id="author-field" class="status-bar-field">
            <@ authors?=>Yazan: @> <@ authors=> $$ @, >
        </p>
        <p id="date-field" class="status-bar-field">
            <@ date?=> Tarih: @> <@ date=> $$ @, >
        </p>
    </div>
</body>

</html>
